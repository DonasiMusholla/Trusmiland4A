<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Musholla Trusmiland Tengahtani 4A</title>
  <meta name="description" content="Musholla Trusmiland Tengah Tani 4A — ruang ibadah baru untuk warga Trusmiland.">

  <!-- Open Graph / Twitter -->
  <meta property="og:title" content="Musholla Trusmiland Tengah Tani 4A">
  <meta property="og:description" content="Ruang ibadah baru untuk warga Trusmiland.">
  <meta property="og:image" content="hero.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="hero.jpg">

  <style>
    /* Basic reset & typography */
    :root{--green:#1f8f4d}
    html,body{height:100%;}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial,"Noto Sans";color:#222;background:#fff}

    /* Hero */
    .hero{position:relative;overflow:hidden;min-height:60vh;display:flex;align-items:center;justify-content:center;color:#fff;text-align:center;background:#000}
    .hero__bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
    .hero__overlay{position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35))}
    .hero__content{position:relative;z-index:2;padding:2rem;max-width:980px}
    .hero__logo{max-width:140px;margin:0 auto 1rem;display:block}
    .hero__title{font-size:clamp(1.5rem,4vw,2.5rem);margin:0 0 .5rem}
    .hero__subtitle{margin:0 0 1rem;opacity:.95}
    .btn--primary{background:var(--green);color:#fff;padding:.6rem 1.1rem;border-radius:6px;text-decoration:none;display:inline-block}
    @media (max-width:600px){.hero{min-height:45vh}.hero__logo{max-width:110px}}

    /* Page layout */
    .container{padding:1.25rem;max-width:980px;margin:0 auto}
    .footer{padding:1rem 0;text-align:center;color:#666;font-size:.9rem}

    /* Utility */
    h2{margin-top:0}
  </style>
</head>
<body>
  <header class="hero" role="banner" aria-label="Hero - Musholla Trusmiland Tengah Tani 4A">
    <picture>
      <source srcset="hero.webp" type="image/webp">
      <img src="hero.jpg" alt="Musholla Trusmiland Tengah Tani 4A at dusk, modern white building with illuminated entrance." class="hero__bg" />
    </picture>

    <div class="hero__overlay" aria-hidden="true"></div>

    <div class="hero__content">
      <img src="logo.png" alt="Logo of Musholla Trusmiland Tengah Tani 4A — green mosque silhouette with sun and field stripes." class="hero__logo">
      <h1 class="hero__title">Musholla Trusmiland Tengah Tani 4A</h1>
      <p class="hero__subtitle">Ruang ibadah baru untuk warga Trusmiland.</p>
      <p><a href="#donasi" class="btn--primary">Donasi</a></p>
    </div>
  </header>

  <main class="container" id="main">
    <h2>Selamat datang</h2>
    <p>Website siap upload. Ganti <code>logo.png</code>, <code>hero.jpg</code> dan <code>proposal.pdf</code> bila diperlukan.</p>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Musholla Trusmiland Tengah Tani 4A</p>
  </footer>

  <script>document.getElementById('year').textContent=new Date().getFullYear();</script>
</body>
</html>
